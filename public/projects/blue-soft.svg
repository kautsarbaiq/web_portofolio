<svg viewBox="0 0 1280 800" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0d16"/>
      <stop offset="1" stop-color="#06080f"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="softBig" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Right side soft cyan radial glow -->
  <circle cx="1010" cy="430" r="430" fill="url(#cyanGlow)"/>

  <!-- Subtle thin grid -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="520" x2="1280" y2="520"/>
    <line x1="0" y1="640" x2="1280" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/>
    <line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="640" y1="0" x2="640" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="960" y1="0" x2="960" y2="800"/>
    <line x1="1120" y1="0" x2="1120" y2="800"/>
  </g>

  <!-- Floating dots for depth -->
  <g fill="#22d3ee">
    <circle cx="120" cy="540" r="2" fill-opacity="0.5"/>
    <circle cx="300" cy="640" r="1.6" fill-opacity="0.35"/>
    <circle cx="560" cy="600" r="2.2" fill-opacity="0.45"/>
    <circle cx="700" cy="220" r="1.6" fill-opacity="0.4"/>
    <circle cx="1180" cy="200" r="2" fill-opacity="0.5"/>
    <circle cx="1240" cy="560" r="1.6" fill-opacity="0.35"/>
    <circle cx="430" cy="700" r="1.6" fill-opacity="0.3"/>
  </g>
  <g fill="#eef2f8">
    <circle cx="240" cy="320" r="1.4" fill-opacity="0.25"/>
    <circle cx="880" cy="640" r="1.4" fill-opacity="0.2"/>
    <circle cx="1060" cy="700" r="1.4" fill-opacity="0.25"/>
  </g>

  <!-- ===== Top nav bar ===== -->
  <g>
    <!-- Logo mark -->
    <g transform="translate(64,46)">
      <rect x="0" y="0" width="28" height="28" rx="8" fill="#22d3ee"/>
      <circle cx="14" cy="14" r="6.5" fill="none" stroke="#06080f" stroke-width="2.4"/>
      <circle cx="14" cy="14" r="1.8" fill="#06080f"/>
    </g>
    <text x="104" y="65" fill="#eef2f8" font-size="19" font-weight="700" letter-spacing="0.2">Blue Soft</text>

    <!-- Nav links -->
    <g font-size="15" font-weight="500">
      <text x="300" y="65" fill="#22d3ee" font-weight="600">Home</text>
      <rect x="300" y="74" width="42" height="2.5" rx="1.25" fill="#22d3ee"/>
      <text x="388" y="65" fill="#97a0b4">About</text>
      <text x="470" y="65" fill="#97a0b4">Services</text>
      <text x="572" y="65" fill="#97a0b4">Portfolio</text>
      <text x="680" y="65" fill="#97a0b4">Contact</text>
    </g>

    <!-- Get Started button -->
    <g transform="translate(1064,40)">
      <rect x="0" y="0" width="152" height="42" rx="21" fill="#22d3ee"/>
      <text x="76" y="27" fill="#06080f" font-size="15" font-weight="700" text-anchor="middle">Get Started</text>
    </g>
  </g>

  <!-- thin nav divider -->
  <line x1="64" y1="118" x2="1216" y2="118" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- ===== Hero (left) ===== -->
  <g>
    <!-- Eyebrow -->
    <g transform="translate(64,250)">
      <rect x="0" y="-14" width="6" height="6" rx="1.5" fill="#22d3ee"/>
      <text x="18" y="-8" fill="#22d3ee" font-size="14" font-weight="700" letter-spacing="3">IOT &amp; SOFTWARE</text>
    </g>

    <!-- Headline -->
    <text x="62" y="330" fill="#eef2f8" font-size="62" font-weight="800" letter-spacing="-1">Smart IoT &amp;</text>
    <text x="62" y="402" fill="#eef2f8" font-size="62" font-weight="800" letter-spacing="-1">Software <tspan fill="#22d3ee">Solutions</tspan></text>

    <!-- Sub paragraph -->
    <text x="64" y="460" fill="#97a0b4" font-size="18">We design connected devices and cloud platforms that</text>
    <text x="64" y="488" fill="#97a0b4" font-size="18">turn real-world data into intelligent, scalable products.</text>

    <!-- Buttons -->
    <g transform="translate(64,536)">
      <rect x="0" y="0" width="168" height="52" rx="26" fill="#22d3ee"/>
      <text x="84" y="33" fill="#06080f" font-size="17" font-weight="700" text-anchor="middle">Get Started</text>
    </g>
    <g transform="translate(252,536)">
      <rect x="0" y="0" width="158" height="52" rx="26" fill="none" stroke="#22d3ee" stroke-width="1.6"/>
      <text x="79" y="33" fill="#22d3ee" font-size="17" font-weight="600" text-anchor="middle">Learn more</text>
    </g>

    <!-- Small stat row -->
    <g transform="translate(64,650)">
      <text x="0" y="22" fill="#eef2f8" font-size="26" font-weight="800">120+</text>
      <text x="0" y="44" fill="#97a0b4" font-size="13">Projects</text>
      <line x1="120" y1="2" x2="120" y2="46" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
      <text x="152" y="22" fill="#eef2f8" font-size="26" font-weight="800">98%</text>
      <text x="152" y="44" fill="#97a0b4" font-size="13">Satisfaction</text>
      <line x1="300" y1="2" x2="300" y2="46" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
      <text x="332" y="22" fill="#eef2f8" font-size="26" font-weight="800">24/7</text>
      <text x="332" y="44" fill="#97a0b4" font-size="13">Support</text>
    </g>
  </g>

  <!-- ===== Right: glowing 3D object (Spline-like) ===== -->
  <g transform="translate(990,430)">
    <!-- halo -->
    <circle cx="0" cy="0" r="240" fill="url(#orbGlow)"/>
    <circle cx="0" cy="0" r="180" fill="#22d3ee" fill-opacity="0.06" filter="url(#softBig)"/>

    <!-- concentric rings (tilted torus feel) -->
    <g fill="none" stroke="url(#ring)" stroke-opacity="0.85">
      <ellipse cx="0" cy="0" rx="190" ry="74" stroke-width="1.4" stroke-opacity="0.35"/>
      <ellipse cx="0" cy="0" rx="155" ry="60" stroke-width="1.6" stroke-opacity="0.5"/>
      <ellipse cx="0" cy="0" rx="120" ry="46" stroke-width="1.8" stroke-opacity="0.7"/>
    </g>
    <g fill="none" stroke="url(#ring)" transform="rotate(60)">
      <ellipse cx="0" cy="0" rx="178" ry="68" stroke-width="1.4" stroke-opacity="0.3"/>
      <ellipse cx="0" cy="0" rx="140" ry="54" stroke-width="1.6" stroke-opacity="0.45"/>
    </g>
    <g fill="none" stroke="url(#ring)" transform="rotate(-55)">
      <ellipse cx="0" cy="0" rx="166" ry="62" stroke-width="1.4" stroke-opacity="0.3"/>
      <ellipse cx="0" cy="0" rx="128" ry="48" stroke-width="1.6" stroke-opacity="0.45"/>
    </g>

    <!-- wireframe sphere meridians -->
    <g fill="none" stroke="#67e8f9" stroke-opacity="0.4" stroke-width="1.2">
      <ellipse cx="0" cy="0" rx="100" ry="100"/>
      <ellipse cx="0" cy="0" rx="38" ry="100"/>
      <ellipse cx="0" cy="0" rx="72" ry="100"/>
      <ellipse cx="0" cy="0" rx="100" ry="38"/>
      <ellipse cx="0" cy="0" rx="100" ry="72"/>
    </g>

    <!-- dotted nodes along an orbit -->
    <g fill="#67e8f9">
      <circle cx="120" cy="0" r="4" filter="url(#soft)"/>
      <circle cx="-120" cy="0" r="3.4"/>
      <circle cx="85" cy="-78" r="3"/>
      <circle cx="-92" cy="70" r="3.2"/>
      <circle cx="0" cy="-118" r="3.6" filter="url(#soft)"/>
      <circle cx="60" cy="96" r="2.8"/>
    </g>

    <!-- glowing core -->
    <circle cx="0" cy="0" r="34" fill="#22d3ee" fill-opacity="0.25" filter="url(#soft)"/>
    <circle cx="0" cy="0" r="16" fill="#67e8f9"/>
    <circle cx="-5" cy="-5" r="6" fill="#eef2f8" fill-opacity="0.8"/>
  </g>

  <!-- subtle floating ui chip near orb -->
  <g transform="translate(820,250)">
    <rect x="0" y="0" width="150" height="56" rx="12" fill="#121726" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="28" cy="28" r="11" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M23 28 l4 4 l7 -8" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="25" fill="#eef2f8" font-size="13" font-weight="600">Connected</text>
    <text x="50" y="42" fill="#97a0b4" font-size="11">42 devices online</text>
  </g>
</svg>
