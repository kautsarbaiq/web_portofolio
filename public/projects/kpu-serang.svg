    </g>
    <line x1="24" y1="324" x2="312" y2="324" stroke="#eef1f6" stroke-width="1"/>

    <!-- row 4 Siti Nurhaliza - Hadir -->
    <g transform="translate(24,336)">
      <circle cx="22" cy="22" r="20" fill="#f472b6" fill-opacity="0.14"/>
      <g transform="translate(22,22)" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="0" cy="-4" r="5"/><path d="M-8 11 c0-5 4-7 8-7 s8 2 8 7"/>
      </g>
      <text x="56" y="18" font-size="13" font-weight="600" fill="#0d1320">Siti Nurhaliza</text>
      <text x="56" y="35" font-size="11" fill="#8b92a4">Anggota / Staf</text>
