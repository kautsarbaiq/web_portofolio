      <text x="48" y="171">45</text>
      <text x="48" y="228">30</text>
      <text x="48" y="285">15</text>
      <text x="48" y="344">0</text>
    </g>

    <!-- bars (8) : slot width 58, bar width 30 -->
    <g fill="#f472b6" fill-opacity="0.85">
      <rect x="71"  y="248" width="30" height="92"  rx="6"/>
      <rect x="135" y="206" width="30" height="134" rx="6"/>
      <rect x="199" y="224" width="30" height="116" rx="6"/>
      <rect x="263" y="170" width="30" height="170" rx="6"/>
      <rect x="327" y="196" width="30" height="144" rx="6"/>
      <rect x="391" y="146" width="30" height="194" rx="6"/>
      <rect x="455" y="184" width="30" height="156" rx="6"/>
      <rect x="519" y="128" width="30" height="212" rx="6"/>
    </g>

    <!-- trend polyline over bar centers (x = slotx+15) -->
    <polyline points="86,256 150,214 214,232 278,178 342,204 406,154 470,192 534,136"
      fill="none" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#ffffff" stroke="#f472b6" stroke-width="2.5">
      <circle cx="86"  cy="256" r="3.5"/>
      <circle cx="150" cy="214" r="3.5"/>
      <circle cx="214" cy="232" r="3.5"/>
      <circle cx="278" cy="178" r="3.5"/>
      <circle cx="342" cy="204" r="3.5"/>
      <circle cx="406" cy="154" r="3.5"/>
      <circle cx="470" cy="192" r="3.5"/>
      <circle cx="534" cy="136" r="3.5"/>
    </g>

    <!-- x axis labels -->
    <g font-size="10.5" fill="#8b92a4" text-anchor="middle">
      <text x="86"  y="362">Jan</text>
      <text x="150" y="362">Feb</text>
      <text x="214" y="362">Mar</text>
      <text x="278" y="362">Apr</text>
      <text x="342" y="362">Mei</text>
      <text x="406" y="362">Jun</text>
      <text x="470" y="362">Jul</text>
      <text x="534" y="362">Agu</text>
    </g>
  </g>

  <!-- ================= ABSENSI LIST CARD ================= -->
  <g transform="translate(904,256)">
    <rect x="0" y="0" width="336" height="416" rx="14" fill="#ffffff" stroke="#e7eaf2" stroke-width="1" filter="url(#sh)"/>
    <text x="24" y="40" font-size="15" font-weight="700" fill="#0d1320">Absensi Anggota</text>
    <text x="24" y="60" font-size="11.5" fill="#8b92a4">Hari ini</text>

    <!-- row template -->
