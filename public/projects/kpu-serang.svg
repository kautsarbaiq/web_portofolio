  <g transform="translate(240,0)">
    <text x="40" y="56" font-size="22" font-weight="700" fill="#0d1320">KPU Kota Serang</text>
    <text x="40" y="78" font-size="12.5" fill="#8b92a4">Ringkasan kegiatan dan kehadiran anggota</text>

    <!-- search -->
    <g transform="translate(520,32)">
      <rect x="0" y="0" width="270" height="44" rx="11" fill="#ffffff" stroke="#e7eaf2" stroke-width="1"/>
      <g transform="translate(18,15)" stroke="#aeb4c4" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="6" cy="6" r="5.5"/>
        <path d="M10.5 10.5 L15 15"/>
      </g>
      <text x="44" y="28" font-size="12.5" fill="#aeb4c4">Cari laporan, anggota...</text>
    </g>

    <!-- date pill -->
    <g transform="translate(810,32)">
      <rect x="0" y="0" width="150" height="44" rx="11" fill="#ffffff" stroke="#e7eaf2" stroke-width="1"/>
      <g transform="translate(18,14)" stroke="#8b92a4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
