<svg viewBox="0 0 1280 800" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef1f8"/>
      <stop offset="1" stop-color="#e4e8f3"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1f2650" flood-opacity="0.10"/>
    </filter>
    <clipPath id="av1"><circle cx="0" cy="0" r="18"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- ================= SIDEBAR ================= -->
  <rect x="0" y="0" width="240" height="800" fill="#ffffff"/>
  <line x1="240" y1="0" x2="240" y2="800" stroke="#e7eaf2" stroke-width="1"/>

  <!-- logo -->
  <g transform="translate(28,34)">
    <rect x="0" y="0" width="36" height="36" rx="10" fill="#f472b6"/>
    <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 25 L11 11"/>
      <path d="M11 18 L18 11"/>
      <path d="M14 21 L20 27"/>
    </g>
    <text x="48" y="18" font-size="17" font-weight="700" fill="#0d1320">KPU</text>
    <text x="48" y="32" font-size="10" font-weight="500" fill="#8b92a4" letter-spacing="0.6">KOTA SERANG</text>
  </g>

  <!-- nav -->
  <g transform="translate(20,112)">
    <!-- Dashboard active -->
    <rect x="0" y="0" width="200" height="44" rx="11" fill="#f472b6" fill-opacity="0.14"/>
    <g transform="translate(16,12)" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="8" height="8" rx="1.5"/>
      <rect x="12" y="0" width="8" height="8" rx="1.5"/>
      <rect x="0" y="12" width="8" height="8" rx="1.5"/>
      <rect x="12" y="12" width="8" height="8" rx="1.5"/>
    </g>
    <text x="54" y="28" font-size="13.5" font-weight="600" fill="#f472b6">Dashboard</text>

    <!-- Laporan -->
    <g transform="translate(16,68)" stroke="#8b92a4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 0 H14 L20 6 V20 H3 Z"/>
      <path d="M14 0 V6 H20"/>
      <path d="M7 11 H15"/>
      <path d="M7 15 H13"/>
    </g>
    <text x="54" y="84" font-size="13.5" font-weight="500" fill="#8b92a4">Laporan</text>

    <!-- Absensi -->
    <g transform="translate(16,124)" stroke="#8b92a4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="18" height="18" rx="3"/>
      <path d="M2 8 H20"/>
      <path d="M7 0 V4"/>
      <path d="M15 0 V4"/>
      <path d="M7 14 l2.4 2.4 L14 12"/>
    </g>
    <text x="54" y="140" font-size="13.5" font-weight="500" fill="#8b92a4">Absensi</text>

    <!-- Anggota -->
    <g transform="translate(16,180)" stroke="#8b92a4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8" cy="6" r="4"/>
      <path d="M1 21 c0-5 3-8 7-8 s7 3 7 8"/>
      <circle cx="18" cy="7" r="3"/>
      <path d="M16 21 c0-4 2-6 5-6"/>
    </g>
    <text x="54" y="196" font-size="13.5" font-weight="500" fill="#8b92a4">Anggota</text>

    <!-- Pengaturan -->
    <g transform="translate(16,236)" stroke="#8b92a4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="3.4"/>
      <path d="M11 1 v3 M11 18 v3 M1 11 h3 M18 11 h3 M4 4 l2.2 2.2 M15.8 15.8 l2.2 2.2 M18 4 l-2.2 2.2 M6.2 15.8 l-2.2 2.2"/>
    </g>
    <text x="54" y="252" font-size="13.5" font-weight="500" fill="#8b92a4">Pengaturan</text>
