  <!-- card 1 : Total Laporan -->
  <g transform="translate(280,112)">
    <rect x="0" y="0" width="306" height="120" rx="14" fill="#ffffff" stroke="#e7eaf2" stroke-width="1" filter="url(#sh)"/>
    <rect x="24" y="24" width="44" height="44" rx="12" fill="#f472b6" fill-opacity="0.14"/>
    <g transform="translate(36,36)" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
