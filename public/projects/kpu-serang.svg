        <circle cx="0" cy="-4" r="7" fill="#f472b6"/>
        <path d="M-13 18 c0-9 6-13 13-13 s13 4 13 13 Z" fill="#f472b6"/>
      </g>
      <circle cx="0" cy="0" r="22" fill="none" stroke="#ffffff" stroke-width="2"/>
    </g>
