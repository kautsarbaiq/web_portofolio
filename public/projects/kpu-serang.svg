    <g transform="translate(24,84)">
      <circle cx="22" cy="22" r="20" fill="#f472b6" fill-opacity="0.14"/>
      <g transform="translate(22,22)" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="0" cy="-4" r="5"/><path d="M-8 11 c0-5 4-7 8-7 s8 2 8 7"/>
      </g>
      <text x="56" y="18" font-size="13" font-weight="600" fill="#0d1320">Andi Saputra</text>
      <text x="56" y="35" font-size="11" fill="#8b92a4">Anggota / Staf</text>
      <g transform="translate(208,11)">
        <rect x="0" y="0" width="64" height="22" rx="8" fill="#16a34a" fill-opacity="0.14"/>
        <text x="36" y="15" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">Hadir</text>
        <circle cx="14" cy="11" r="3" fill="#16a34a"/>
      </g>
    </g>
    <line x1="24" y1="156" x2="312" y2="156" stroke="#eef1f6" stroke-width="1"/>

    <!-- row 2 Rina Wijaya - Hadir -->
    <g transform="translate(24,168)">
      <circle cx="22" cy="22" r="20" fill="#f472b6" fill-opacity="0.14"/>
      <g transform="translate(22,22)" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="0" cy="-4" r="5"/><path d="M-8 11 c0-5 4-7 8-7 s8 2 8 7"/>
      </g>
      <text x="56" y="18" font-size="13" font-weight="600" fill="#0d1320">Rina Wijaya</text>
      <text x="56" y="35" font-size="11" fill="#8b92a4">Anggota / Staf</text>
      <g transform="translate(208,11)">
        <rect x="0" y="0" width="64" height="22" rx="8" fill="#16a34a" fill-opacity="0.14"/>
        <text x="36" y="15" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">Hadir</text>
        <circle cx="14" cy="11" r="3" fill="#16a34a"/>
      </g>
    </g>
    <line x1="24" y1="240" x2="312" y2="240" stroke="#eef1f6" stroke-width="1"/>

    <!-- row 3 Budi Santoso - Izin -->
    <g transform="translate(24,252)">
      <circle cx="22" cy="22" r="20" fill="#f472b6" fill-opacity="0.14"/>
      <g transform="translate(22,22)" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="0" cy="-4" r="5"/><path d="M-8 11 c0-5 4-7 8-7 s8 2 8 7"/>
      </g>
      <text x="56" y="18" font-size="13" font-weight="600" fill="#0d1320">Budi Santoso</text>
      <text x="56" y="35" font-size="11" fill="#8b92a4">Anggota / Staf</text>
      <g transform="translate(216,11)">
        <rect x="0" y="0" width="56" height="22" rx="8" fill="#f59e0b" fill-opacity="0.14"/>
        <text x="34" y="15" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">Izin</text>
        <circle cx="14" cy="11" r="3" fill="#f59e0b"/>
