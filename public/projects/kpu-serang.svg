  <!-- sidebar footer user -->
  <g transform="translate(20,724)">
    <rect x="0" y="0" width="200" height="52" rx="12" fill="#f6f7fb"/>
    <circle cx="30" cy="26" r="16" fill="#f472b6" fill-opacity="0.18"/>
    <g transform="translate(30,26)" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round">
      <circle cx="0" cy="-3" r="4"/>
      <path d="M-6 9 c0-4 3-6 6-6 s6 2 6 6"/>
    </g>
    <text x="56" y="23" font-size="12" font-weight="600" fill="#0d1320">Admin KPU</text>
    <text x="56" y="38" font-size="10.5" fill="#8b92a4">Operator</text>
