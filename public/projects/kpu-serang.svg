    <!-- plot area : x 60..576 , baseline y=340 , top y=110 -->
    <!-- gridlines -->
    <g stroke="#eef1f6" stroke-width="1">
      <line x1="60" y1="110" x2="576" y2="110"/>
      <line x1="60" y1="167" x2="576" y2="167"/>
      <line x1="60" y1="224" x2="576" y2="224"/>
      <line x1="60" y1="281" x2="576" y2="281"/>
      <line x1="60" y1="340" x2="576" y2="340"/>
    </g>
    <!-- y axis labels -->
    <g font-size="10" fill="#aeb4c4" text-anchor="end">
