<svg viewBox="0 0 1280 800" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1f8"/>
      <stop offset="1" stop-color="#e4e8f3"/>
    </linearGradient>
    <linearGradient id="feat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d5efc" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6d5efc" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1f2650" flood-opacity="0.10"/>
    </filter>
    <filter id="phoneShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="34" flood-color="#1f2650" flood-opacity="0.22"/>
    </filter>
    <filter id="blurA" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="466" y="44" width="348" height="712" rx="32"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="330" cy="230" r="180" fill="#6d5efc" fill-opacity="0.20" filter="url(#blurA)"/>
  <circle cx="980" cy="620" r="200" fill="#6d5efc" fill-opacity="0.16" filter="url(#blurA)"/>

  <!-- phone -->
  <g filter="url(#phoneShadow)">
    <rect x="450" y="20" width="380" height="760" rx="44" fill="#0d1320"/>
    <rect x="458" y="28" width="364" height="744" rx="38" fill="#ffffff"/>
  </g>
  <!-- screen surface -->
  <rect x="466" y="44" width="348" height="712" rx="32" fill="#f5f6fb"/>
  <!-- notch -->
  <rect x="592" y="38" width="96" height="22" rx="11" fill="#0d1320"/>

  <g clip-path="url(#screenClip)">
    <!-- status bar -->
    <text x="488" y="86" font-size="13" font-weight="600" fill="#0d1320">9:41</text>
    <g stroke="#0d1320" stroke-width="2" stroke-linecap="round" fill="none">
      <path d="M748 82 a3 3 0 0 1 6 0"/>
      <path d="M744 84 a8 8 0 0 1 14 0"/>
      <path d="M740 86 a13 13 0 0 1 22 0"/>
    </g>
    <g fill="#0d1320">
      <rect x="766" y="76" width="3" height="8" rx="1"/>
      <rect x="771" y="73" width="3" height="11" rx="1"/>
      <rect x="776" y="70" width="3" height="14" rx="1"/>
    </g>
    <rect x="784" y="71" width="22" height="12" rx="3" fill="none" stroke="#0d1320" stroke-width="2"/>
    <rect x="786.5" y="73.5" width="14" height="7" rx="1.5" fill="#0d1320"/>
    <rect x="807" y="74" width="2" height="6" rx="1" fill="#0d1320"/>

    <!-- header -->
    <text x="488" y="124" font-size="20" font-weight="700" fill="#0d1320">Hi, Kautsar</text>
    <text x="488" y="144" font-size="12.5" fill="#8b92a4">Selamat datang</text>
    <!-- bell icon -->
    <g transform="translate(744,118)" stroke="#0d1320" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M0 -7 C7 -7 9 -2 9 4 C9 8 11 9 11 11 L-11 11 C-11 9 -9 8 -9 4 C-9 -2 -7 -7 0 -7 Z"/>
      <path d="M-3 14 a3 3 0 0 0 6 0"/>
    </g>
    <circle cx="744" cy="115" r="3" fill="#6d5efc"/>
    <!-- avatar -->
    <circle cx="790" cy="124" r="18" fill="#6d5efc" fill-opacity="0.14"/>
    <g transform="translate(790,124)" stroke="#6d5efc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="0" cy="-4" r="5"/>
      <path d="M-8 9 C-8 2 8 2 8 9"/>
    </g>

    <!-- featured housing card -->
    <g filter="url(#sh)">
      <rect x="488" y="166" width="304" height="146" rx="16" fill="#ffffff" stroke="#e7eaf2"/>
    </g>
    <rect x="504" y="182" width="76" height="114" rx="12" fill="url(#feat)"/>
    <!-- house line icon -->
    <g transform="translate(542,239)" stroke="#6d5efc" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M-18 0 L0 -16 L18 0"/>
      <path d="M-14 -3 L-14 16 L14 16 L14 -3"/>
      <rect x="-5" y="4" width="10" height="12" rx="1.5"/>
    </g>
    <text x="600" y="206" font-size="11" fill="#8b92a4">Cluster Unggulan</text>
    <text x="600" y="232" font-size="18" font-weight="700" fill="#0d1320">Cluster Permata</text>
    <!-- chip 120 unit -->
    <rect x="600" y="248" width="78" height="26" rx="13" fill="#6d5efc" fill-opacity="0.14"/>
    <g transform="translate(614,261)" stroke="#6d5efc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="-5" y="-5" width="10" height="10" rx="1.5"/>
      <path d="M-5 -1 L5 -1 M-1 -5 L-1 5"/>
    </g>
    <text x="626" y="265" font-size="11.5" font-weight="600" fill="#6d5efc">120 unit</text>
    <!-- chip Aktif -->
    <rect x="684" y="248" width="62" height="26" rx="13" fill="#16a34a" fill-opacity="0.14"/>
    <circle cx="699" cy="261" r="3.5" fill="#16a34a"/>
    <text x="708" y="265" font-size="11.5" font-weight="600" fill="#16a34a">Aktif</text>

    <!-- section title -->
    <text x="488" y="350" font-size="15" font-weight="700" fill="#0d1320">Hunian</text>
    <text x="792" y="350" font-size="12" font-weight="600" fill="#6d5efc" text-anchor="end">Lihat semua</text>

    <!-- unit row template -->
    <!-- row 1 -->
    <g filter="url(#sh)">
      <rect x="488" y="368" width="304" height="78" rx="14" fill="#ffffff" stroke="#e7eaf2"/>
    </g>
    <rect x="504" y="384" width="46" height="46" rx="10" fill="#6d5efc" fill-opacity="0.10"/>
    <g transform="translate(527,407)" stroke="#6d5efc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M-11 0 L0 -10 L11 0"/>
      <path d="M-8 -2 L-8 10 L8 10 L8 -2"/>
    </g>
    <text x="566" y="400" font-size="14.5" font-weight="700" fill="#0d1320">Blok A-12</text>
    <text x="566" y="420" font-size="11.5" fill="#8b92a4">Penghuni terdaftar</text>
    <rect x="708" y="395" width="62" height="24" rx="12" fill="#16a34a" fill-opacity="0.14"/>
    <text x="739" y="411" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">Lunas</text>

    <!-- row 2 -->
    <g filter="url(#sh)">
      <rect x="488" y="456" width="304" height="78" rx="14" fill="#ffffff" stroke="#e7eaf2"/>
    </g>
    <rect x="504" y="472" width="46" height="46" rx="10" fill="#6d5efc" fill-opacity="0.10"/>
    <g transform="translate(527,495)" stroke="#6d5efc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M-11 0 L0 -10 L11 0"/>
      <path d="M-8 -2 L-8 10 L8 10 L8 -2"/>
    </g>
    <text x="566" y="488" font-size="14.5" font-weight="700" fill="#0d1320">Blok B-04</text>
    <text x="566" y="508" font-size="11.5" fill="#8b92a4">Penghuni terdaftar</text>
    <rect x="700" y="483" width="70" height="24" rx="12" fill="#f59e0b" fill-opacity="0.14"/>
    <text x="735" y="499" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">Pending</text>

    <!-- row 3 -->
    <g filter="url(#sh)">
      <rect x="488" y="544" width="304" height="78" rx="14" fill="#ffffff" stroke="#e7eaf2"/>
    </g>
    <rect x="504" y="560" width="46" height="46" rx="10" fill="#6d5efc" fill-opacity="0.10"/>
    <g transform="translate(527,583)" stroke="#6d5efc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M-11 0 L0 -10 L11 0"/>
      <path d="M-8 -2 L-8 10 L8 10 L8 -2"/>
    </g>
    <text x="566" y="576" font-size="14.5" font-weight="700" fill="#0d1320">Blok C-09</text>
    <text x="566" y="596" font-size="11.5" fill="#8b92a4">Penghuni terdaftar</text>
    <rect x="708" y="571" width="62" height="24" rx="12" fill="#16a34a" fill-opacity="0.14"/>
    <text x="739" y="587" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">Lunas</text>

    <!-- bottom tab bar -->
    <rect x="466" y="688" width="348" height="68" fill="#ffffff"/>
    <rect x="466" y="688" width="348" height="1" fill="#e7eaf2"/>

    <!-- Home active -->
    <rect x="486" y="700" width="56" height="44" rx="14" fill="#6d5efc" fill-opacity="0.14"/>
    <g transform="translate(514,718)" stroke="#6d5efc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M-9 1 L0 -8 L9 1"/>
      <path d="M-6 -1 L-6 8 L6 8 L6 -1"/>
    </g>
    <text x="514" y="738" font-size="9" font-weight="600" fill="#6d5efc" text-anchor="middle">Home</text>

    <!-- Units -->
    <g transform="translate(594,718)" stroke="#8b92a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="-8" y="-7" width="7" height="14" rx="1.5"/>
      <rect x="1" y="-3" width="7" height="10" rx="1.5"/>
    </g>
    <text x="594" y="738" font-size="9" fill="#8b92a4" text-anchor="middle">Units</text>

    <!-- Visits -->
    <g transform="translate(686,716)" stroke="#8b92a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="-9" y="-6" width="18" height="15" rx="2.5"/>
      <path d="M-9 -1 L9 -1"/>
      <path d="M-5 -9 L-5 -3 M5 -9 L5 -3"/>
    </g>
    <text x="686" y="738" font-size="9" fill="#8b92a4" text-anchor="middle">Visits</text>

    <!-- Profile -->
    <g transform="translate(766,717)" stroke="#8b92a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="0" cy="-4" r="4.5"/>
      <path d="M-8 9 C-8 2 8 2 8 9"/>
    </g>
    <text x="766" y="738" font-size="9" fill="#8b92a4" text-anchor="middle">Profile</text>
  </g>

  <!-- home indicator -->
  <rect x="600" y="746" width="80" height="4" rx="2" fill="#0d1320" fill-opacity="0.25"/>
</svg>