<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#eef0f7" />
    <meta
      name="description"
      content="Kautsar Qaulan Sadida Baiquni — Fullstack Web Developer specializing in frontend architecture. Next.js, React & TypeScript."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Kautsar Baiquni — Fullstack Web Developer" />
    <meta
      property="og:description"
      content="Fullstack developer with a frontend obsession — building scalable, pixel-perfect web apps with Next.js, React & TypeScript."
    />
    <meta property="og:type" content="website" />

    <!-- Fonts: preconnect + display=swap for perf -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />

    <title>Kautsar Baiquni — Fullstack Web Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Set theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('kb-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
